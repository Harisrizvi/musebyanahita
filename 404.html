<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Muse by Anahita</title>
    <script>
      // GitHub Pages SPA redirect: preserve the deep-link path and hand it
      // back to index.html so the client-side router can render the page.
      (function () {
        var l = window.location;
        var repoSegments = 0; // set to 1 if deploying to a PROJECT page (user.github.io/repo)
        var pathSegmentsToKeep = repoSegments;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
