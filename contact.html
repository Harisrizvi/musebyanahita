<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Muse by Anahita</title>
  <style>
    :root {
        --crimson:    #810B38;
        --burgundy:   #541A1A;
        --sage:       #869B7E;
        --sand:       #DCC3AA;
        --parchment:  #F1E2D1;
        --ivory:      #F6F3EB;
        --espresso:   #2A1010;
        --bg:         #1a0a0d;
        --surface:    #251013;
        --surface-2:  #2f1417;
        --text:       #F6F3EB;
        --text-soft:  rgba(246,243,235,0.72);
        --muted:      rgba(220,195,170,0.6);
        --line:       rgba(220,195,170,0.16);
        --line-strong:rgba(220,195,170,0.28);
        --ink:        #1a0a0d;
        --ink-soft:   #251013;
        --cream:      #F6F3EB;
        --champagne:  #DCC3AA;
        --champagne-2:#810B38;
        --rose:       #c9a4a0;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background-color: #1a0a0d;
        color: #F6F3EB;
        margin: 0; padding: 0;
        overflow-x: hidden; width: 100%;
        -webkit-font-smoothing: antialiased;
    }

    .text-gold {
        background: linear-gradient(120deg, #F6F3EB 0%, #DCC3AA 48%, #810B38 86%, #F6F3EB 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
    }

    #preloader {
        position: fixed; inset: 0; z-index: 300;
        background: #541A1A;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #preloader.hidden { opacity: 0; visibility: hidden; }
    .pre-mark {
        font-family: 'Bodoni Moda', serif;
        color: #F6F3EB;
        font-size: clamp(2.2rem, 8vw, 4rem);
        letter-spacing: 0.35em; text-indent: 0.35em; font-style: italic;
        opacity: 0; transform: translateY(12px);
        animation: preIn 1.1s ease forwards 0.15s;
    }
    .pre-line {
        margin-top: 1.4rem; width: 0; height: 1px;
        background: linear-gradient(90deg, transparent, #DCC3AA, transparent);
        animation: preLine 1.8s ease forwards 0.5s;
    }
    @keyframes preIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes preLine { to { width: min(220px, 50vw); } }

    .btn-ghost {
        position: relative; overflow: hidden; border-radius: 999px;
        color: #DCC3AA; border: 1px solid rgba(220,195,170,0.28);
        transition: color .5s ease, border-color .5s ease;
    }
    .btn-ghost::after {
        content: ""; position: absolute; inset: 0; z-index: -1;
        background: #810B38; transform: translateY(101%);
        transition: transform .5s cubic-bezier(.16,.7,.3,1);
    }
    .btn-ghost:hover { color: #F6F3EB; border-color: #810B38; }
    .btn-ghost:hover::after { transform: translateY(0); }

    .btn-primary {
        background: #810B38; color: #F6F3EB;
        border: none; border-radius: 999px;
        padding: 14px 32px; font-size: 10px;
        letter-spacing: 0.25em; text-transform: uppercase;
        text-decoration: none; cursor: pointer;
        transition: background 0.3s ease;
        display: inline-block;
    }
    .btn-primary:hover { background: #9e0e44; }

    /* Nav Styles */
    nav#main-nav.scrolled {
        background-color: rgba(26,10,13,0.90) !important;
        backdrop-filter: blur(14px) !important;
        -webkit-backdrop-filter: blur(14px) !important;
    }

    .nav-link {
        color: rgba(246,243,235,0.75) !important;
        transition: color 0.3s ease;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.2em;
        margin: 0 15px;
    }

    .nav-link:hover {
        color: #F6F3EB !important;
    }

    .nav-link.active {
        color: #F6F3EB !important;
        border-bottom: 2px solid #810B38 !important;
    }

    .nav-book-btn {
        border: 1px solid rgba(220,195,170,0.28) !important;
        color: #DCC3AA !important;
        background-color: transparent !important;
        transition: background-color 0.3s ease, color 0.3s ease !important;
    }

    .nav-book-btn:hover {
        background-color: #810B38 !important;
        color: #F6F3EB !important;
    }
  </style>
</head>
<body>
  <!-- Preloader matching Step 4 -->
  <div id="preloader">
    <div class="pre-mark">Muse</div>
    <div class="pre-line"></div>
  </div>

  <nav id="main-nav" class="scrolled">
    <div style="max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="nav-link" style="font-family: 'Bodoni Moda', serif; font-style: italic; font-size: 1.5rem; border: none;">MUSE</a>
      <div>
        <a href="services.html" class="nav-link">services</a>
        <a href="bridal.html" class="nav-link">bridal</a>
        <a href="gallery.html" class="nav-link">gallery</a>
        <a href="contact.html" class="nav-link active">contact</a>
      </div>
      <a href="contact.html" class="nav-book-btn" style="padding: 10px 20px; border-radius: 999px; text-decoration: none; font-family: 'DM Sans', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;">Book Now</a>
    </div>
  </nav>

  <main style="padding: 160px 20px; max-width: 800px; margin: 0 auto; text-align: center;">
    <h1 class="text-gold" style="font-family: 'Bodoni Moda', serif; font-style: italic; font-size: clamp(2rem, 6vw, 4.5rem); margin-bottom: 20px; line-height: 1.15;">Get In Touch</h1>
    <p style="color: var(--text-soft); font-size: 14px; line-height: 1.6; max-width: 500px; margin: 0 auto 40px auto; letter-spacing: 0.05em;">
      Whether you wish to schedule a personal appointment or have custom bridal queries, we would love to hear from you.
    </p>
    <div>
      <a href="index.html" class="btn-primary">Return to Main Website</a>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const preloader = document.getElementById('preloader');
        if (preloader) preloader.classList.add('hidden');
      }, 1000);
    });
  </script>
</body>
</html>
